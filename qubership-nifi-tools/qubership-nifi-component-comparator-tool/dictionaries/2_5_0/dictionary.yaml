displayNameMapping:
  - JettyWebSocketClient:
      User Name: Username
      User Password: Password

  - JettyWebSocketServer:
      Listen Port: Port
      SSL Client Authentication: Client Authentication
      Enable Basic Authentication: Basic Authentication Enabled

  - ConsumeAMQP:
      User Name: Username
      Use Client Certificate Authentication: Client Certificate Authentication Enabled
  - ExecuteSQL:
      SQL select query: SQL Query
  - ExecuteSQLRecord:
      SQL select query: SQL Query
  - JoltTransformJSON:
      Jolt Transformation DSL: Jolt Transform
