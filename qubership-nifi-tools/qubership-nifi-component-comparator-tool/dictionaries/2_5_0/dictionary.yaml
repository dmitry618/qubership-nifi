  - XMLRecordSetWriter:
    - Schema Protocol Version

  - CSVRecordSetWriter:
    - Schema Protocol Version

  - JsonRecordSetWriter:
    - Schema Protocol Version

  - ElasticSearchClientServiceImpl:
    - Retry timeout

  - ConsumeAMQP:
    - Client Auth
  - ConsumeAzureEventHub:
    - Consumer Hostname
  - ConsumeJMS:
    - Session Cache Size
  - ListFTP:
    - Distributed Cache Service
  - ListSFTP:
    - Distributed Cache Service
    - Remote Poll Batch Size
  - ListenHTTP:
    - Max Data to Receive per Second
  - ListenTCP:
